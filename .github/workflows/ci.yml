name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Windows: PyAudioWPatch (WASAPI loopback) is Windows-only.
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Byte-compile
        run: python -m compileall -q meeting_notes tools tests

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
        run: |
          python tests/test_core.py
          python tests/test_changelog.py
          python tests/test_audit_fixes.py
          python tests/test_resilience.py
          python tests/test_finalize.py
          python tests/test_features2.py
          python tests/test_transcription_options.py
          python tests/test_longmeeting.py
          python tests/test_action_items.py
          python tests/test_ui_fixes.py
          python tests/test_folders.py
          python tests/test_ai_provider.py
          python tests/test_vad.py
          python tests/test_deepgram.py
          python tests/test_overlay.py
          python tests/test_input_warning.py
          python tests/test_ui_smoke.py
          python tests/test_due_dates.py
          python tests/test_pages.py
          python tests/test_cloud.py
          python tests/test_share_link.py
          python tests/test_onboarding.py
          python tests/test_updater.py
          python tests/test_updater_mac.py
          python tests/test_ghost_flash.py

  test-macos:
    # Apple Silicon. QT_QPA_PLATFORM is cocoa (not offscreen): the offscreen
    # plugin's stylesheet repolish is pathologically slow on macOS (minutes per
    # theme toggle), while cocoa runs headless-fine on the GitHub runner.
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (pinned, macOS)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.macos.txt
          pip install pyinstaller==6.21.0

      - name: Build the audio tap helper (compile check)
        run: sh packaging/mac/audiotap/build.sh

      - name: Byte-compile
        run: python -m compileall -q meeting_notes tools tests

      - name: Run tests
        env:
          QT_QPA_PLATFORM: cocoa
          PYTHONIOENCODING: utf-8
        run: |
          python tests/test_core.py
          python tests/test_changelog.py
          python tests/test_audit_fixes.py
          python tests/test_resilience.py
          python tests/test_finalize.py
          python tests/test_features2.py
          python tests/test_transcription_options.py
          python tests/test_longmeeting.py
          python tests/test_action_items.py
          python tests/test_ui_fixes.py
          python tests/test_folders.py
          python tests/test_ai_provider.py
          python tests/test_vad.py
          python tests/test_deepgram.py
          python tests/test_overlay.py
          python tests/test_input_warning.py
          python tests/test_ui_smoke.py
          python tests/test_due_dates.py
          python tests/test_pages.py
          python tests/test_cloud.py
          python tests/test_share_link.py
          python tests/test_onboarding.py
          python tests/test_updater.py
          python tests/test_updater_mac.py
          python tests/test_capture_mac.py
          python tests/test_ghost_flash.py

      - name: Build and validate the packaged macOS app
        run: |
          python -m PyInstaller packaging/earshot_mac.spec --noconfirm --clean --distpath dist --workpath build
          plutil -lint dist/Earshot.app/Contents/Info.plist
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' dist/Earshot.app/Contents/Info.plist)" = "app.tryearshot.earshot"
          test -n "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' dist/Earshot.app/Contents/Info.plist)"
          codesign --verify --deep --strict --verbose=2 dist/Earshot.app
          file dist/Earshot.app/Contents/MacOS/Earshot | grep -q arm64

      - name: Packaged app launch smoke test
        env:
          QT_QPA_PLATFORM: cocoa
        run: |
          dist/Earshot.app/Contents/MacOS/Earshot > "$RUNNER_TEMP/earshot-launch.log" 2>&1 &
          pid=$!
          sleep 8
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/earshot-launch.log"
            exit 1
          fi
          kill "$pid"
          wait "$pid" || true
